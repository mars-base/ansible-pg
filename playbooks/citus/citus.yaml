---
# Citus 分布式 PostgreSQL 数据库部署剧本
# 详细说明见 playbooks/citus/README.md

# Example:
#   基础部署（coordinator + worker）：
#     playbooks/citus/citus.yaml \
#       -e _coordinator_hostname=pg_single_1 \
#       -e _worker_hostname=pg_single_2 \
#       -e _citus_to_db=dev \
#       -e _pg_user=admin -e _pg_password=admin
#
#   验证集群状态：
#     playbooks/citus/citus.yaml \
#       -e _coordinator_hostname=pg_single_1 \
#       -e _worker_hostname=pg_single_2 \
#       -e _citus_to_db=dev \
#       -e _pg_user=admin -e _pg_password=admin \
#       -t verify
#
#   配置所有节点 DNS（多节点场景）：
#     playbooks/citus/citus.yaml \
#       -e _coordinator_hostname=pg_single_1 \
#       -e _worker_hostname=pg_single_2 \
#       -e _citus_to_db=dev \
#       -e _pg_user=admin -e _pg_password=admin \
#       -t dns \
#       -e "_citus_all_nodes=['pg_single_1','pg_single_2','pg_single_3']"
#
#   创建多租户：
#     playbooks/citus/citus.yaml \
#       -e _coordinator_hostname=pg_single_1 \
#       -e _worker_hostname=pg_single_2 \
#       -e _citus_to_db=dev \
#       -e _pg_user=admin -e _pg_password=admin \
#       -t tenant \
#       -e _citus_tenant_name=myfarm1 \
#       -e _citus_tenant_password=myfarm1

- name: Deploy citus on postgresql cluster
  hosts: localhost
  gather_facts: yes
  become: no
  vars:
    _coordinator_hostname: ""
    _worker_hostname: ""
    _citus_to_db: ""
    _pg_user: ""
    _pg_password: ""
    _postgres_port: 5432
    _citus_all_nodes: "{{ [_coordinator_hostname, _worker_hostname] | unique }}"
    _citus_tenant_name: ""
    _citus_tenant_password: ""
  tasks:
    - name: Check params
      assert:
        that:
          - _coordinator_hostname is defined and _coordinator_hostname != ""
          - _citus_to_db is defined and _citus_to_db != ""
          - _pg_user is defined and _pg_user != ""
          - _pg_password is defined and _pg_password != ""
          - _worker_hostname is defined and _worker_hostname != ""
          - _postgres_port is defined and _postgres_port != ""
          - _citus_tenant_name is defined
          - _citus_tenant_password is defined

    - name: Install citus extension on coordinator
      shell: |
        PGPASSWORD='{{ _pg_password }}' psql -h localhost -p {{ _postgres_port }} -U {{ _pg_user }} -d {{ _citus_to_db }} \
        -c "CREATE EXTENSION IF NOT EXISTS citus;"
      args:
        executable: /bin/bash
      delegate_to: "{{ _coordinator_hostname }}"

    - name: Install citus extension on worker
      shell: |
        PGPASSWORD='{{ _pg_password }}' psql -h localhost -p {{ _postgres_port }} -U {{ _pg_user }} -d {{ _citus_to_db }} \
        -c "CREATE EXTENSION IF NOT EXISTS citus;"
      args:
        executable: /bin/bash
      delegate_to: "{{ _worker_hostname }}"

    - name: Show coordinator node ip address
      debug:
        msg: "coordinator node ip address: {{ hostvars[_coordinator_hostname].ansible_host }}"
    - name: Show worker node ip address
      debug:
        msg: "worker node ip address: {{ hostvars[_worker_hostname].ansible_host }}"

    - name: Configure DNS for citus nodes
      become: true
      become_user: root
      become_method: sudo
      block:
        - name: Add worker node ip to coordinator dns record /etc/hosts file
          lineinfile:
            path: /etc/hosts
            line: "{{ hostvars[_worker_hostname].ansible_host }} {{ _worker_hostname }}"
            create: yes
          delegate_to: "{{ _coordinator_hostname }}"

        - name: Add coordinator node ip to worker dns record /etc/hosts file
          lineinfile:
            path: /etc/hosts
            line: "{{ hostvars[_coordinator_hostname].ansible_host }} {{ _coordinator_hostname }}"
            create: yes
          delegate_to: "{{ _worker_hostname }}"

        - name: Add citus all nodes to coordinator /etc/hosts file
          lineinfile:
            path: /etc/hosts
            line: "{{ hostvars[item].ansible_host }} {{ item }}"
            create: yes
          loop: "{{ _citus_all_nodes }}"
          delegate_to: "{{ _coordinator_hostname }}"
          tags: [dns]

        - name: Add citus all nodes to worker /etc/hosts file
          lineinfile:
            path: /etc/hosts
            line: "{{ hostvars[item].ansible_host }} {{ item }}"
            create: yes
          loop: "{{ _citus_all_nodes }}"
          delegate_to: "{{ _worker_hostname }}"
          tags: [dns]

    - block:
        # 第一个任务：创建租户用户（如果不存在）
        - name: Check if tenant user exists
          shell: |
            PGPASSWORD='{{ _pg_password }}' psql -h localhost -p {{ _postgres_port }} -U {{ _pg_user }} -d {{ _citus_to_db }} -tAc \
            "SELECT 1 FROM pg_roles WHERE rolname='{{ _citus_tenant_name }}';"
          args:
            executable: /bin/bash
          delegate_to: "{{ _coordinator_hostname }}"
          register: _user_exists
          changed_when: false

        - name: Create tenant user on citus
          shell: |
            PGPASSWORD='{{ _pg_password }}' psql -h localhost -p {{ _postgres_port }} -U {{ _pg_user }} -d {{ _citus_to_db }} \
            -c "CREATE USER {{ _citus_tenant_name }} WITH PASSWORD '{{ _citus_tenant_password }}';"
          args:
            executable: /bin/bash
          delegate_to: "{{ _coordinator_hostname }}"
          when: _user_exists.stdout | trim == ""
          register: _citus_create_user

        - name: Check citus create user result
          debug:
            msg: "Tenant user '{{ _citus_tenant_name }}' already exists, skipped creation."
          when: _user_exists.stdout | trim != ""

        # 第二个任务：创建模式
        - name: Check if schema exists
          shell: |
            PGPASSWORD='{{ _pg_password }}' psql -h localhost -p {{ _postgres_port }} -U {{ _pg_user }} -d {{ _citus_to_db }} -tAc \
            "SELECT 1 FROM information_schema.schemata WHERE schema_name='{{ _citus_tenant_name }}';"
          args:
            executable: /bin/bash
          delegate_to: "{{ _coordinator_hostname }}"
          register: _schema_exists
          changed_when: false

        - name: Create schema on citus
          shell: |
            PGPASSWORD='{{ _pg_password }}' psql -h localhost -p {{ _postgres_port }} -U {{ _pg_user }} -d {{ _citus_to_db }} \
            -c "CREATE SCHEMA AUTHORIZATION {{ _citus_tenant_name }};"
          args:
            executable: /bin/bash
          delegate_to: "{{ _coordinator_hostname }}"
          when: _schema_exists.stdout | trim == ""
          register: _citus_create_schema

        - name: Check citus create schema result
          debug:
            msg: "Schema '{{ _citus_tenant_name }}' already exists, skipped creation."
          when: _schema_exists.stdout | trim != ""

        # 第三个任务：分布式处理模式
        - name: Distribute schema on citus
          shell: |
            PGPASSWORD='{{ _pg_password }}' psql -h localhost -p {{ _postgres_port }} -U {{ _pg_user }} -d {{ _citus_to_db }} \
            -c "SELECT citus_schema_distribute('{{ _citus_tenant_name }}');"
          args:
            executable: /bin/bash
          delegate_to: "{{ _coordinator_hostname }}"
          register: _citus_distribute_schema
      when: _citus_tenant_name is defined and _citus_tenant_password is defined and _citus_tenant_name != "" and _citus_tenant_password != ""
      tags: [tenant]

    - name: Register the coordinator node to postgresql cluster
      shell: |
        PGPASSWORD='{{ _pg_password }}' psql -h localhost -p {{ _postgres_port }} -U {{ _pg_user }} -d {{ _citus_to_db }} -tAc \
        "SELECT count(*) FROM pg_dist_node WHERE nodename='{{ _coordinator_hostname }}' AND nodeport={{ _postgres_port }} AND groupid=0;"
      register: _coordinator_registered
      changed_when: false
      delegate_to: "{{ _coordinator_hostname }}"

    - name: Register coordinator node
      shell: |
        PGPASSWORD='{{ _pg_password }}' psql -h localhost -p {{ _postgres_port }} -U {{ _pg_user }} -d {{ _citus_to_db }} \
        -c "SELECT citus_set_coordinator_host('{{ _coordinator_hostname }}', {{ _postgres_port }});"
      delegate_to: "{{ _coordinator_hostname }}"
      when: _coordinator_registered.stdout | trim == "0"
      register: _citus_set_coordinator_host

    - debug:
        msg: "Coordinator node already registered."
      when: _coordinator_registered.stdout | trim != "0"

    - name: Check if worker node is already registered
      shell: |
        PGPASSWORD='{{ _pg_password }}' psql -h localhost -p {{ _postgres_port }} -U {{ _pg_user }} -d {{ _citus_to_db }} -tAc \
        "SELECT count(*) FROM pg_dist_node WHERE nodename='{{ _worker_hostname }}' AND nodeport={{ _postgres_port }};"
      register: _worker_registered
      changed_when: false
      delegate_to: "{{ _coordinator_hostname }}"

    - name: Register the worker node to postgresql cluster
      shell: |
        PGPASSWORD='{{ _pg_password }}' psql -h localhost -p {{ _postgres_port }} -U {{ _pg_user }} -d {{ _citus_to_db }} \
        -c "SELECT * from citus_add_node('{{ _worker_hostname }}', {{ _postgres_port }});"
      delegate_to: "{{ _coordinator_hostname }}"
      when: _worker_registered.stdout | trim == "0"
      register: _citus_add_node

    - debug:
        msg: "Worker node already registered."
      when: _worker_registered.stdout | trim != "0"

    - name: Verify that citus coordinator and worker node is ready
      shell: |
        PGPASSWORD='{{ _pg_password }}' psql -h localhost -p {{ _postgres_port }} -U {{ _pg_user }} -d {{ _citus_to_db }} \
        -c "SELECT * FROM citus_get_active_worker_nodes();"
      register: _citus_get_active_worker_nodes
      delegate_to: "{{ _coordinator_hostname }}"
      tags: [verify]
    - debug:
        msg: "Verify that postgresql distribution cluster is ready result:\n{{ _citus_get_active_worker_nodes.stdout }}"
      tags: [verify]

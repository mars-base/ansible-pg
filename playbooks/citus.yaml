---
# ============================================================================
# Citus 分布式 PostgreSQL 数据库部署剧本
# ============================================================================
#
# ⚠️ 重要：架构要求
#
#   Citus 必须配合多个 Patroni 单节点使用，不能使用 Patroni HA 自动故障切换！
#
#   原因：Patroni 自动 failover 后，Citus 元数据（pg_dist_node）不会自动更新，
#   导致 coordinator 找不到 worker、worker 找不到 coordinator，整个分布式集群不可用。
#
#   正确架构：
#     dev1 (Patroni 单节点) ←→ coordinator + worker
#     dev2 (Patroni 单节点) ←→ worker
#     dev3 (Patroni 单节点) ←→ worker
#
#   错误架构：
#     Patroni HA 集群（1 primary + N replica）× Citus ❌
#
# ============================================================================
#
# 作用：
#   1. 在 coordinator 和 worker 节点上安装 citus 扩展
#   2. 配置节点间 DNS 解析
#   3. 注册 coordinator 和 worker 节点到 citus 集群
#   4. 创建多租户 schema（可选）
#
# 前置条件 - 安装 citus 扩展（多个 Patroni 单节点）：
#
#   Citus 需要在所有节点上安装扩展，假设有 3 个单节点分组：
#   - pg_single_1 (coordinator)
#   - pg_single_2 (worker)
#   - pg_single_3 (worker)
#
#   1. 在每个节点的 group_vars 中添加 citus 配置：
#
#      # group_vars/pg_single_1/pg_all.yaml
#      # group_vars/pg_single_2/pg_all.yaml
#      # group_vars/pg_single_3/pg_all.yaml
#      postgres_shared_preload_libraries: "pg_cron,pg_stat_statements,uuid-ossp,citus"
#
#      pg_extensions:
#        - "pg_cron"
#        - "citus"
#
#      pg_extensions_on:
#        - { db: 'dev', extension: 'citus' }
#
#   2. 在所有节点更新 Patroni 配置（自动重启 PostgreSQL）：
#
#      ansible-playbook -i hosts.ini playbooks/pg-ha-cluster.yaml \
#        -e HOSTS=pg_single_1 -t patroni-config
#      ansible-playbook -i hosts.ini playbooks/pg-ha-cluster.yaml \
#        -e HOSTS=pg_single_2 -t patroni-config
#      ansible-playbook -i hosts.ini playbooks/pg-ha-cluster.yaml \
#        -e HOSTS=pg_single_3 -t patroni-config
#
#      # 或者一次性执行所有节点：
#      for host in pg_single_1 pg_single_2 pg_single_3; do
#        ansible-playbook -i hosts.ini playbooks/pg-ha-cluster.yaml \
#          -e HOSTS=$host -t patroni-config
#      done
#
#   3. 在所有节点安装扩展包并创建扩展：
#
#      for host in pg_single_1 pg_single_2 pg_single_3; do
#        ansible-playbook -i hosts.ini playbooks/pg-ha-cluster.yaml \
#          -e HOSTS=$host -t pg-extension
#      done
#
# 使用本剧本配置集群：
#   ansible-playbook -i hosts.ini playbooks/citus.yaml \
#     -e _coordinator_hostname=dev1 \
#     -e _worker_hostname=dev2 \
#     -e _citus_to_db=dev \
#     -e _pg_user=admin \
#     -e _pg_password=admin
#
# 验证集群状态：
#   ansible-playbook -i hosts.ini playbooks/citus.yaml \
#     -e _coordinator_hostname=dev1 -e _worker_hostname=dev2 \
#     -e _citus_to_db=dev -e _pg_user=admin -e _pg_password=admin \
#     -t verify
#
# ============================================================================

# 参数说明
# HOSTS: 主机列表
# _coordinator_hostname: 协调器主机名
# _citus_to_db: citus 扩展安装到的数据库名 仅在这个数据库里使用citus分布式
# _pg_user: pg 的管理员账号 如admin
# _pg_password: pg 管理员账号密码
# _worker_hostname: 工作节点主机名
# _postgres_port: postgresql 端口

# 配置所有节点dns
# 依次更新_worker_hostname
# playbooks/citus.yaml -e _coordinator_hostname=dev1 -e _citus_to_db=dev -e _pg_user=admin -e _pg_password=admin -e _worker_hostname=dev2 -t dns -e "_citus_all_nodes=['dev1','dev2','dev3','dev4']"

# 水平扩容节点
# 修改hba 增加新节点的访问权限 修改变量postgres_citus_nodes 增加新节点ip/32
# 重载hba配置到所有集群节点
# -e HOSTS=dev playbooks/postgresql.yaml -t hba
# 需要把所有的节点主机名对应ip信息 配置到各个worker节点 参考上面的配置dns
# 添加一个新的worker节点，在协调节点（coordinator）执行重新分片以分担数据负载
# SELECT rebalance_table_shards();
# 这会 迁移部分数据分片 到新 worker 节点，是一个可能影响性能的操作，应在低峰期进行。

# 删除节点
# 查询shardid分片数据
# SELECT * FROM pg_dist_shard_placement where nodename='dev2' and nodeport=5432;
# 如果返回 非空结果，说明它还持有数据，不能直接删除
# 迁出某 worker 上的所有分片
# 根据上面的 pg_dist_shard_placement 查询结果逐个移动
# -- SELECT master_move_shard_placement(102018, 'dev2', 5432, 'dev3', 5432);
# 当该节点上 不再持有任何分片 后，可以安全移除
# -- SELECT citus_remove_node('dev2', 5432); -- 需要管理员账号
# 这会从 pg_dist_node 中删除该条记录，并停止将其用于新分片分配。


# --- 创建Citus微服务 多租户 适用于对schema进行分布式的场景 schema对应租户名一致
# playbooks/citus.yaml -e _coordinator_hostname=dev1 -e _citus_to_db=dev -e _pg_user=admin -e _pg_password=admin -e _worker_hostname=dev2 -t tenant -e _citus_tenant_name=myfarm1 -e _citus_tenant_password=myfarm1
# playbooks/citus.yaml -e _coordinator_hostname=dev1 -e _citus_to_db=dev -e _pg_user=admin -e _pg_password=admin -e _worker_hostname=dev2 -t tenant -e _citus_tenant_name=myfarm2 -e _citus_tenant_password=myfarm2
# playbooks/citus.yaml -e _coordinator_hostname=dev1 -e _citus_to_db=dev -e _pg_user=admin -e _pg_password=admin -e _worker_hostname=dev2 -t tenant -e _citus_tenant_name=myfarm3 -e _citus_tenant_password=myfarm3

# Example

# dev is citus extension installed db
# dev1 is coordinator node
# dev2 is worker node

# auto register coordinator node and add worker node to build citus cluster
# playbooks/citus.yaml -e _coordinator_hostname=dev1 -e _citus_to_db=dev -e _pg_user=admin -e _pg_password=admin -e _worker_hostname=dev2

# verify citus extension is ready
# playbooks/citus.yaml -e _coordinator_hostname=dev1 -e _citus_to_db=dev -e _pg_user=admin -e _pg_password=admin -e _worker_hostname=dev2 -t verify

- name: Deploy citus on postgresql cluster
  hosts: localhost
  gather_facts: yes
  become: no
  vars:
    _citus_all_nodes: []
    _coordinator_hostname: ""
    _citus_to_db: ""
    _pg_user: ""
    _pg_password: ""
    _worker_hostname: ""
    _postgres_port: 5432
    _citus_tenant_name: ""
    _citus_tenant_password: ""
  tasks:
    - name: Check params
      assert:
        that:
          - _citus_all_nodes | length > 0
          - _coordinator_hostname is defined and _coordinator_hostname != ""
          - _citus_to_db is defined and _citus_to_db != ""
          - _pg_user is defined and _pg_user != ""
          - _pg_password is defined and _pg_password != ""
          - _worker_hostname is defined and _worker_hostname != ""
          - _postgres_port is defined and _postgres_port != ""
          - _citus_tenant_name is defined
          - _citus_tenant_password is defined

    - name: Install citus extension on coordinator
      shell: |
        PGPASSWORD='{{ _pg_password }}' psql -h localhost -p {{ _postgres_port }} -U {{ _pg_user }} -d {{ _citus_to_db }} \
        -c "CREATE EXTENSION IF NOT EXISTS citus;"
      args:
        executable: /bin/bash
      delegate_to: "{{ _coordinator_hostname }}"

    - name: Install citus extension on worker
      shell: |
        PGPASSWORD='{{ _pg_password }}' psql -h localhost -p {{ _postgres_port }} -U {{ _pg_user }} -d {{ _citus_to_db }} \
        -c "CREATE EXTENSION IF NOT EXISTS citus;"
      args:
        executable: /bin/bash
      delegate_to: "{{ _worker_hostname }}"

    - name: Show coordinator node ip address
      debug:
        msg: "coordinator node ip address: {{ hostvars[_coordinator_hostname].ansible_host }}"
    - name: Show worker node ip address
      debug:
        msg: "worker node ip address: {{ hostvars[_worker_hostname].ansible_host }}"

    - name: Configure DNS for citus nodes
      become: true
      become_user: root
      become_method: sudo
      block:
        - name: Add worker node ip to coordinator dns record /etc/hosts file
          lineinfile:
            path: /etc/hosts
            line: "{{ hostvars[_worker_hostname].ansible_host }} {{ _worker_hostname }}"
            create: yes
          delegate_to: "{{ _coordinator_hostname }}"

        - name: Add coordinator node ip to worker dns record /etc/hosts file
          lineinfile:
            path: /etc/hosts
            line: "{{ hostvars[_coordinator_hostname].ansible_host }} {{ _coordinator_hostname }}"
            create: yes
          delegate_to: "{{ _worker_hostname }}"

        - name: Add citus all worker nodes to each worker /etc/hosts file
          lineinfile:
            path: /etc/hosts
            line: "{{ hostvars[item].ansible_host }} {{ item }}"
            create: yes
          loop: "{{ _citus_all_nodes }}"
          delegate_to: "{{ _worker_hostname }}"
          tags: [dns]

    - block:
        # 第一个任务：创建租户用户（如果不存在）
        - name: Check if tenant user exists
          shell: |
            PGPASSWORD='{{ _pg_password }}' psql -h localhost -p {{ _postgres_port }} -U {{ _pg_user }} -d {{ _citus_to_db }} -tAc \
            "SELECT 1 FROM pg_roles WHERE rolname='{{ _citus_tenant_name }}';"
          args:
            executable: /bin/bash
          delegate_to: "{{ _coordinator_hostname }}"
          register: _user_exists
          changed_when: false

        - name: Create tenant user on citus
          shell: |
            PGPASSWORD='{{ _pg_password }}' psql -h localhost -p {{ _postgres_port }} -U {{ _pg_user }} -d {{ _citus_to_db }} \
            -c "CREATE USER {{ _citus_tenant_name }} WITH PASSWORD '{{ _citus_tenant_password }}';"
          args:
            executable: /bin/bash
          delegate_to: "{{ _coordinator_hostname }}"
          when: _user_exists.stdout | trim == ""
          register: _citus_create_user

        - name: Check citus create user result
          debug:
            msg: "Tenant user '{{ _citus_tenant_name }}' already exists, skipped creation."
          when: _user_exists.stdout | trim != ""

        # 第二个任务：创建模式
        - name: Check if schema exists
          shell: |
            PGPASSWORD='{{ _pg_password }}' psql -h localhost -p {{ _postgres_port }} -U {{ _pg_user }} -d {{ _citus_to_db }} -tAc \
            "SELECT 1 FROM information_schema.schemata WHERE schema_name='{{ _citus_tenant_name }}';"
          args:
            executable: /bin/bash
          delegate_to: "{{ _coordinator_hostname }}"
          register: _schema_exists
          changed_when: false

        - name: Create schema on citus
          shell: |
            PGPASSWORD='{{ _pg_password }}' psql -h localhost -p {{ _postgres_port }} -U {{ _pg_user }} -d {{ _citus_to_db }} \
            -c "CREATE SCHEMA AUTHORIZATION {{ _citus_tenant_name }};"
          args:
            executable: /bin/bash
          delegate_to: "{{ _coordinator_hostname }}"
          when: _schema_exists.stdout | trim == ""
          register: _citus_create_schema

        - name: Check citus create schema result
          debug:
            msg: "Schema '{{ _citus_tenant_name }}' already exists, skipped creation."
          when: _schema_exists.stdout | trim != ""

        # 第三个任务：分布式处理模式
        - name: Distribute schema on citus
          shell: |
            PGPASSWORD='{{ _pg_password }}' psql -h localhost -p {{ _postgres_port }} -U {{ _pg_user }} -d {{ _citus_to_db }} \
            -c "SELECT citus_schema_distribute('{{ _citus_tenant_name }}');"
          args:
            executable: /bin/bash
          delegate_to: "{{ _coordinator_hostname }}"
          register: _citus_distribute_schema
      when: _citus_tenant_name is defined and _citus_tenant_password is defined and _citus_tenant_name != "" and _citus_tenant_password != ""
      tags: [tenant]

    - name: Register the coordinator node to postgresql cluster
      shell: |
        PGPASSWORD='{{ _pg_password }}' psql -h localhost -p {{ _postgres_port }} -U {{ _pg_user }} -d {{ _citus_to_db }} -tAc \
        "SELECT count(*) FROM pg_dist_node WHERE nodename='{{ _coordinator_hostname }}' AND nodeport={{ _postgres_port }} AND groupid=0;"
      register: _coordinator_registered
      changed_when: false
      delegate_to: "{{ _coordinator_hostname }}"

    - name: Register coordinator node
      shell: |
        PGPASSWORD='{{ _pg_password }}' psql -h localhost -p {{ _postgres_port }} -U {{ _pg_user }} -d {{ _citus_to_db }} \
        -c "SELECT citus_set_coordinator_host('{{ _coordinator_hostname }}', {{ _postgres_port }});"
      delegate_to: "{{ _coordinator_hostname }}"
      when: _coordinator_registered.stdout | trim == "0"
      register: _citus_set_coordinator_host

    - debug:
        msg: "Coordinator node already registered."
      when: _coordinator_registered.stdout | trim != "0"

    - name: Check if worker node is already registered
      shell: |
        PGPASSWORD='{{ _pg_password }}' psql -h localhost -p {{ _postgres_port }} -U {{ _pg_user }} -d {{ _citus_to_db }} -tAc \
        "SELECT count(*) FROM pg_dist_node WHERE nodename='{{ _worker_hostname }}' AND nodeport={{ _postgres_port }};"
      register: _worker_registered
      changed_when: false
      delegate_to: "{{ _coordinator_hostname }}"

    - name: Register the worker node to postgresql cluster
      shell: |
        PGPASSWORD='{{ _pg_password }}' psql -h localhost -p {{ _postgres_port }} -U {{ _pg_user }} -d {{ _citus_to_db }} \
        -c "SELECT * from citus_add_node('{{ _worker_hostname }}', {{ _postgres_port }});"
      delegate_to: "{{ _coordinator_hostname }}"
      when: _worker_registered.stdout | trim == "0"
      register: _citus_add_node

    - debug:
        msg: "Worker node already registered."
      when: _worker_registered.stdout | trim != "0"

    - name: Verify that citus coordinator and worker node is ready
      shell: |
        PGPASSWORD='{{ _pg_password }}' psql -h localhost -p {{ _postgres_port }} -U {{ _pg_user }} -d {{ _citus_to_db }} \
        -c "SELECT * FROM citus_get_active_worker_nodes();"
      register: _citus_get_active_worker_nodes
      delegate_to: "{{ _coordinator_hostname }}"
      tags: [verify]
    - debug:
        msg: "Verify that postgresql distribution cluster is ready result:\n{{ _citus_get_active_worker_nodes.stdout }}"
      tags: [verify]

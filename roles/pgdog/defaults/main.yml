---
# defaults file for roles/pgdog
pgdog_version: main
pgdog_image: "ghcr.io/pgdogdev/pgdog:{{ pgdog_version }}"
pgdog_dir: /srv/pgdog
pgdog_host: "127.0.0.1"
pgdog_openmetrics_port: 19090

# Multi-instance configuration (recommended)
# Each instance runs as an independent pgdog process with its own port, databases, and users.
# Example:
#   pgdog_instances:
#     - name: production
#       port: 6432
#       databases:
#         - name: "pgdog"
#           host: "127.0.0.1"
#           port: 5432
#           database_name: "shard1"
#           shard: 0
#           role: "primary"
#       users:
#         - database: "pgdog"
#           name: "dba"
#           password: "secret"
#       sharded_tables:
#         - database: "pgdog"
#           name: "users"
#           column: "id"
#           data_type: "bigint"
#     - name: dev
#       port: 6433
#       databases: [...]
#       users: [...]
#       sharded_tables: [...]
pgdog_instances: []

# Legacy single-instance defaults (backward compatibility)
# Used only when pgdog_instances is empty or not defined.
pgdog_port: 7432
pgdog_databases:
  - name: "pgdog"
    host: "127.0.0.1"
    port: 5432
    database_name: "test1"
    shard: 0
    role: "primary"
  - name: "pgdog"
    host: "127.0.0.1"
    port: 5432
    database_name: "test2"
    shard: 1
    role: "primary"
pgdog_dba_password: "CHANGEME"
pgdog_users:
  - database: "pgdog"
    name: "dba"
    password: "{{ pgdog_dba_password }}"
pgdog_sharded_tables:
  - database: "pgdog"
    name: "users"
    column: "id"
    data_type: "bigint"
